    <body>
        <menu id="menu" class="menu"></menu>
        <section id="landing" class="landing">
            <div class="landing__right">
                <img class="landing__right--svg circle-svg" style="--i: 2" src="/images/heroSectionCircle.svg" alt="" />
                <img class="landing__right--svg circle-svg" style="--i: 4" src="/images/heroSectionCircle.svg" alt="" />
                <img class="landing__right--svg circle-svg" style="--i: 6" src="/images/heroSectionCircle.svg" alt="" />

                <img
                    class="landing__right--svg circle-svg"
                    style="--i: 9.9"
                    src="/images/heroSectionCircle.svg"
                    alt=""
                />
                <img
                    class="landing__right--svg polygon-svg"
                    style="--i: 1"
                    src="/images/heroSectionPolygon.svg"
                    alt=""
                />
                <img
                    class="landing__right--svg polygon-svg"
                    style="--i: 8"
                    src="/images/heroSectionPolygon.svg"
                    alt=""
                />

                <div class="landing__right--wrapper-title">
                    <img class="landing__right--wrapper-title__svg" src="/images/heroSectionDiamond.svg" alt="" />

                        بهترین راه حل و <br />
                        <span class="hightlight"
                            ><span class="hightlight__title">تجارت خود</span>
                            <div class="hightlight__dot-1"></div>
                            <div class="hightlight__dot-2"></div>
                            <div class="hightlight__dot-3"></div>
                            <div class="hightlight__dot-4"></div
                        ></span>
                        را آسانتر <br />
                        از همیشه رشد دهید
                    </h1>
                </div>
                <p class="landing__right--desc">
                    لورم ایپسوم متن ساختگی با تولید سادگی نامفهوم از صنعت چاپ، و با استفاد، و جوابگوی سوالات پیوسته اهل
                    دنیای موجود طراحی اساسا مورد استفاده قرار گیرد.
                </p>
                <button class="button landing__right--go-to-skills">برو به مهارت ها</button>

                    <p class="landing__right--scroll-down-text">به پایین اسکرول کنید</p>
                    <svg
                        class="landing__right--scroll-down-svg"
                        width="44"
                        height="87"
                        viewBox="0 0 44 87"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >

                            stroke-width="3"
                            stroke-linecap="round"
                        />
                        <path
                            d="M2 72C6.37365 73.6182 9.12869 79.496 10.8235 83.6248C11.8377 86.0955 11.9741 84.8718 12.6618 82.8206C13.689 79.7563 15.0545 77.6004 17 75.0707"

            <div class="landing__left">
